name: Deploy worker

on:
  push:
    branches: [main]
    paths:
      - "thermal-worker/**"
      - "prisma/**"
      - ".github/workflows/deploy-worker.yml"

concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: thermal-worker/package-lock.json

      - run: npm ci --prefix thermal-worker

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config thermal-worker/fly.toml --dockerfile thermal-worker/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
